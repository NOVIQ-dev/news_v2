version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fintelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintelligence
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fintelligence"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fintelligence-network

  redis:
    image: redis:7-alpine
    container_name: fintelligence-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fintelligence-network

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: fintelligence-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@postgres:5432/fintelligence
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      POLYMARKET_API_KEY: ${POLYMARKET_API_KEY}
      API_PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - fintelligence-network

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: fintelligence-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    networks:
      - fintelligence-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  fintelligence-network:
    driver: bridge
